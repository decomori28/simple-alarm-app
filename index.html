<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー・アラーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #e8e8ea;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }

    /* 16:9 stage */
    .stage {
      width: min(100vw, 177.78vh);
      height: min(100vh, 56.25vw);
      background: #fff;
      box-shadow: 0 8px 48px rgba(0,0,0,0.14);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== TIMER PANEL ===== */
    #panel-timer {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 4% 6% 3%;
    }

    #panel-alarm { display: none; }
    #panel-alarm.active { display: flex; flex: 1; flex-direction: column; padding: 4% 8% 3%; justify-content: center; }

    /* Tabs row */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3%;
      flex-shrink: 0;
    }

    .tabs { display: flex; gap: 1.6em; }

    .tab {
      font-size: 0.8em;
      font-weight: 700;
      color: #ccc;
      cursor: pointer;
      padding-bottom: 3px;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.1em;
      transition: all 0.2s;
    }
    .tab.active { color: #e53935; border-color: #e53935; }

    .tab-label {
      font-size: 0.8em;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #ddd;
    }

    /* BIG TIME DISPLAY */
    .time-hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #timer-display {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #1a1a1a;
      /* font-size set by JS */
    }

    #timer-display.running { color: #e53935; }
    #timer-display.done { color: #e53935; animation: blink 0.6s infinite alternate; }

    @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

    /* Progress bar */
    .progress-wrap {
      flex-shrink: 0;
      margin-bottom: 3%;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: #f0f0f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #e53935;
      border-radius: 99px;
      transition: width 0.5s linear;
      width: 100%;
    }

    /* Bottom controls */
    .bottom {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 2%;
    }

    /* Presets */
    .presets {
      display: flex;
      gap: 1.5%;
      justify-content: center;
    }

    .preset-btn {
      border: none;
      border-radius: 8px;
      background: #f5f5f7;
      color: #666;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.75em;
      padding: 5px 14px;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }

    .preset-btn.selected { background: #e53935; color: #fff; }
    .preset-btn:hover:not(.selected) { background: #ffe5e5; color: #e53935; }

    /* Custom time inputs */
    .custom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1%;
    }

    .time-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .time-field label {
      font-size: 0.55em;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #bbb;
    }

    .time-field input {
      width: 52px;
      text-align: center;
      background: #f5f5f7;
      border: 1.5px solid transparent;
      border-radius: 8px;
      color: #1a1a1a;
      font-weight: 700;
      font-size: 0.8em;
      padding: 5px 0;
      transition: border-color 0.2s;
    }

    .time-field input:focus { outline: none; border-color: #e53935; }
    .sep { font-size: 1em; color: #ccc; font-weight: 300; }

    /* Action buttons */
    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3%;
    }

    .act-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 0.55em;
      font-weight: 700;
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }

    .act-btn:hover { color: #666; }

    .act-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #f5f5f7;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4em;
    }

    .play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #e53935;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(229,57,53,0.4);
      transition: all 0.15s;
    }

    .play-btn:hover { background: #c62828; }
    .play-btn:active { transform: scale(0.94); }
    .play-btn svg { width: 22px; height: 22px; fill: #fff; }

    .status-msg {
      text-align: center;
      font-size: 0.7em;
      font-weight: 600;
      color: #e53935;
      min-height: 1.2em;
      letter-spacing: 0.04em;
    }

    /* ===== ALARM PANEL ===== */
    .alarm-time-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 4%;
    }

    .alarm-time-row input {
      width: 90px;
      text-align: center;
      background: #f5f5f7;
      border: 1.5px solid transparent;
      border-radius: 12px;
      color: #1a1a1a;
      font-weight: 700;
      font-size: 1.8em;
      padding: 10px 0;
    }

    .alarm-time-row input:focus { outline: none; border-color: #e53935; }
    .alarm-sep { font-size: 2em; color: #ccc; }

    .add-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: #e53935;
      color: #fff;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(229,57,53,0.3);
      transition: background 0.15s;
    }

    .add-btn:hover { background: #c62828; }

    .alarm-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      max-height: 200px;
    }

    .alarm-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: #f5f5f7;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: 700;
    }

    .alarm-item.fired { background: #fff0f0; border-left: 3px solid #e53935; animation: blink 0.6s infinite alternate; }
    .alarm-item .del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.1em; }
    .alarm-item .del:hover { color: #e53935; }
    .alarm-status { text-align: center; font-size: 0.85em; font-weight: 600; color: #e53935; margin-top: 10px; }
  </style>
</head>
<body>
<div class="stage" id="stage">

  <!-- Timer Panel -->
  <div id="panel-timer">
    <div class="topbar">
      <div class="tab-label">⏱ TIMER</div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('timer')">TIMER</div>
        <div class="tab" onclick="switchTab('alarm')">ALARM</div>
      </div>
    </div>

    <!-- Big time -->
    <div class="time-hero">
      <div id="timer-display">01:00</div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom">
      <!-- Presets -->
      <div class="presets">
        <button class="preset-btn selected" onclick="setPreset(1,this)">1 MIN</button>
        <button class="preset-btn" onclick="setPreset(2,this)">2 MIN</button>
        <button class="preset-btn" onclick="setPreset(3,this)">3 MIN</button>
        <button class="preset-btn" onclick="setPreset(4,this)">4 MIN</button>
        <button class="preset-btn" onclick="setPreset(5,this)">5 MIN</button>
      </div>

      <!-- Custom inputs -->
      <div class="custom-row">
        <div class="time-field">
          <label>HR</label>
          <input type="number" id="inp-h" min="0" max="23" value="0">
        </div>
        <span class="sep">:</span>
        <div class="time-field">
          <label>MIN</label>
          <input type="number" id="inp-m" min="0" max="59" value="1">
        </div>
        <span class="sep">:</span>
        <div class="time-field">
          <label>SEC</label>
          <input type="number" id="inp-s" min="0" max="59" value="0">
        </div>
      </div>

      <!-- Action buttons -->
      <div class="actions">
        <button class="act-btn" onclick="timerReset()">
          <div class="act-icon">↺</div>
          <span>RESET</span>
        </button>
        <button class="play-btn" id="play-btn" onclick="timerToggle()">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="act-btn" id="pause-btn" onclick="timerToggle()" style="opacity:0.35;pointer-events:none;">
          <div class="act-icon">⏸</div>
          <span>PAUSE</span>
        </button>
      </div>

      <div class="status-msg" id="timer-status"></div>
    </div>
  </div>

  <!-- Alarm Panel -->
  <div id="panel-alarm">
    <div class="topbar">
      <div class="tab-label">⏰ ALARM</div>
      <div class="tabs">
        <div class="tab" onclick="switchTab('timer')">TIMER</div>
        <div class="tab active" onclick="switchTab('alarm')">ALARM</div>
      </div>
    </div>
    <div class="alarm-time-row">
      <input type="number" id="al-h" min="0" max="23" placeholder="HH">
      <span class="alarm-sep">:</span>
      <input type="number" id="al-m" min="0" max="59" placeholder="MM">
    </div>
    <button class="add-btn" onclick="addAlarm()">アラーム追加</button>
    <div class="alarm-list" id="alarm-list"></div>
    <div class="alarm-status" id="alarm-status"></div>
  </div>

</div>

<script>
// ---- Tab ----
function switchTab(name) {
  document.getElementById('panel-timer').style.display = name === 'timer' ? 'flex' : 'none';
  document.getElementById('panel-alarm').className = name === 'alarm' ? 'active' : '';
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent === name.toUpperCase());
  });
  if (name === 'timer') sizeDisplay();
}

// ---- Responsive font size ----
function sizeDisplay() {
  const stage = document.getElementById('stage');
  const W = stage.clientWidth;
  const H = stage.clientHeight;
  // タイマー表示: ステージ幅の約30%（最大でHの45%）
  const fs = Math.min(W * 0.28, H * 0.45);
  document.getElementById('timer-display').style.fontSize = fs + 'px';
}

window.addEventListener('resize', sizeDisplay);
setTimeout(sizeDisplay, 0);

// ---- Timer ----
let timerTotal = 60;
let timerRemaining = 60;
let timerRunning = false;
let timerInterval = null;

function setPreset(minutes, btn) {
  if (timerRunning) return;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  if (btn) btn.classList.add('selected');
  timerTotal = minutes * 60;
  timerRemaining = timerTotal;
  document.getElementById('inp-h').value = 0;
  document.getElementById('inp-m').value = minutes;
  document.getElementById('inp-s').value = 0;
  updateDisplay(timerRemaining);
  updateBar(timerRemaining, timerTotal);
  document.getElementById('timer-display').className = '';
  document.getElementById('timer-status').textContent = '';
}

function getInputSeconds() {
  const h = parseInt(document.getElementById('inp-h').value) || 0;
  const m = parseInt(document.getElementById('inp-m').value) || 0;
  const s = parseInt(document.getElementById('inp-s').value) || 0;
  return h * 3600 + m * 60 + s;
}

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateDisplay(sec) {
  document.getElementById('timer-display').textContent = formatTime(sec);
}

function updateBar(remaining, total) {
  const pct = total > 0 ? (remaining / total) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function timerToggle() {
  if (timerRunning) { timerPause(); return; }
  if (timerRemaining <= 0 || timerRemaining === timerTotal) {
    const sec = getInputSeconds();
    if (sec <= 0) { document.getElementById('timer-status').textContent = '時間を設定してください'; return; }
    timerTotal = sec;
    timerRemaining = sec;
  }
  timerStart();
}

function timerStart() {
  timerRunning = true;
  document.getElementById('timer-display').className = 'running';
  document.getElementById('timer-status').textContent = '';
  document.getElementById('pause-btn').style.opacity = '1';
  document.getElementById('pause-btn').style.pointerEvents = 'auto';
  document.getElementById('play-icon').innerHTML = '<path d="M6 6h4v12H6zm8 0h4v12h-4z"/>';
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateDisplay(timerRemaining);
    updateBar(timerRemaining, timerTotal);
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timer-display').className = 'done';
      document.getElementById('timer-status').textContent = '完了しました！';
      document.getElementById('play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
      document.getElementById('pause-btn').style.opacity = '0.35';
      document.getElementById('pause-btn').style.pointerEvents = 'none';
      playChime();
    }
  }, 1000);
}

function timerPause() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timer-display').className = '';
  document.getElementById('play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  document.getElementById('pause-btn').style.opacity = '0.35';
  document.getElementById('pause-btn').style.pointerEvents = 'none';
}

function timerReset() {
  timerPause();
  timerRemaining = timerTotal;
  document.getElementById('timer-display').className = '';
  document.getElementById('timer-status').textContent = '';
  updateDisplay(timerRemaining);
  updateBar(timerRemaining, timerTotal);
}

updateDisplay(timerRemaining);
updateBar(timerRemaining, timerTotal);

// ---- Alarm ----
const alarms = [];
setInterval(checkAlarms, 1000);

function addAlarm() {
  const h = parseInt(document.getElementById('al-h').value);
  const m = parseInt(document.getElementById('al-m').value);
  if (isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) {
    document.getElementById('alarm-status').textContent = '正しい時刻を入力してください'; return;
  }
  alarms.push({ h, m, label: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`, fired: false, id: Date.now() });
  document.getElementById('alarm-status').textContent = '';
  renderAlarms();
}

function removeAlarm(id) {
  const i = alarms.findIndex(a => a.id === id);
  if (i >= 0) alarms.splice(i, 1);
  renderAlarms();
}

function renderAlarms() {
  const list = document.getElementById('alarm-list');
  list.innerHTML = '';
  alarms.forEach(a => {
    const el = document.createElement('div');
    el.className = 'alarm-item' + (a.fired ? ' fired' : '');
    el.innerHTML = `<span>${a.label}</span><button class="del" onclick="removeAlarm(${a.id})">✕</button>`;
    list.appendChild(el);
  });
}

function checkAlarms() {
  const now = new Date();
  alarms.forEach(a => {
    if (!a.fired && now.getHours() === a.h && now.getMinutes() === a.m && now.getSeconds() === 0) {
      a.fired = true;
      document.getElementById('alarm-status').textContent = `⏰ ${a.label} のアラームです！`;
      playChime();
      renderAlarms();
      setTimeout(() => { a.fired = false; renderAlarms(); }, 60000);
    }
  });
}

// ---- Sound: 短いビープ×3 を 2セット ----
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(startTime) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.value = 1318.5;
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.35, startTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.12);
  osc.start(startTime);
  osc.stop(startTime + 0.13);
}

function playChime() {
  const t = audioCtx.currentTime;
  const bi = 0.18;
  const si = 0.85;
  playBeep(t); playBeep(t + bi); playBeep(t + bi * 2);
  playBeep(t + si); playBeep(t + si + bi); playBeep(t + si + bi * 2);
}
</script>
</body>
</html>
