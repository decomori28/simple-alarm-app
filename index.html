<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー・アラーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #f5f5f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 380px;
      padding: 32px 20px 28px;
      background: #fff;
      border-radius: 32px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.10);
    }

    /* Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 28px;
    }

    .tab {
      font-size: 0.95rem;
      font-weight: 600;
      color: #bbb;
      cursor: pointer;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.04em;
      transition: all 0.2s;
    }

    .tab.active {
      color: #e53935;
      border-color: #e53935;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Circle */
    .circle-wrap {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto 28px;
    }

    .circle-svg {
      width: 260px;
      height: 260px;
      transform: rotate(-90deg);
    }

    .circle-bg {
      fill: none;
      stroke: #f0f0f0;
      stroke-width: 6;
    }

    .circle-tick {
      fill: none;
      stroke: #e0e0e0;
      stroke-width: 2;
    }

    .circle-progress {
      fill: none;
      stroke: #e53935;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s linear;
    }

    .circle-dot {
      fill: #e53935;
      transition: all 0.5s linear;
    }

    .circle-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .circle-icon {
      font-size: 1.3rem;
      color: #e53935;
      margin-bottom: 4px;
    }

    .timer-display {
      font-size: 4.2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      color: #e53935;
      line-height: 1;
    }

    .timer-display.idle { color: #1a1a1a; }
    .timer-display.done { animation: pulse 0.6s infinite alternate; }

    .timer-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #e53935;
      background: #fff0f0;
      border-radius: 20px;
      padding: 3px 12px;
      margin-top: 6px;
      display: inline-block;
    }

    @keyframes pulse {
      from { opacity: 1; }
      to   { opacity: 0.3; }
    }

    /* Presets */
    .presets {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 22px;
    }

    .preset-btn {
      flex: 1;
      max-width: 72px;
      padding: 10px 4px 8px;
      border-radius: 14px;
      border: none;
      background: #f5f5f7;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .preset-btn span {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #aaa;
    }

    .preset-btn.selected {
      background: #e53935;
      color: #fff;
    }

    .preset-btn.selected span { color: rgba(255,255,255,0.8); }
    .preset-btn:hover:not(.selected) { background: #ffe5e5; color: #e53935; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }

    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      font-weight: 600;
      transition: color 0.15s;
    }

    .ctrl-btn:hover { color: #555; }

    .ctrl-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .play-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: #e53935;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(229,57,53,0.4);
      transition: all 0.15s;
    }

    .play-btn:hover { background: #c62828; box-shadow: 0 6px 24px rgba(229,57,53,0.5); }
    .play-btn:active { transform: scale(0.95); }

    .play-btn svg { width: 28px; height: 28px; fill: #fff; }

    /* Custom input */
    .custom-input {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      margin-bottom: 20px;
    }

    .time-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .time-field label {
      font-size: 0.6rem;
      color: #bbb;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .time-field input {
      width: 60px;
      padding: 6px 0;
      text-align: center;
      background: #f5f5f7;
      border: 1.5px solid transparent;
      border-radius: 10px;
      color: #1a1a1a;
      font-size: 1.1rem;
      font-weight: 600;
      transition: border-color 0.2s;
    }

    .time-field input:focus { outline: none; border-color: #e53935; }

    .sep { font-size: 1.4rem; font-weight: 300; color: #ccc; align-self: flex-end; padding-bottom: 6px; }

    /* ---- Alarm ---- */
    .alarm-wrap { padding: 0 4px; }

    .alarm-time-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 16px 0 20px;
    }

    .alarm-time-row input {
      width: 80px;
      padding: 12px 0;
      text-align: center;
      background: #f5f5f7;
      border: 1.5px solid transparent;
      border-radius: 14px;
      color: #1a1a1a;
      font-size: 2rem;
      font-weight: 700;
    }

    .alarm-time-row input:focus { outline: none; border-color: #e53935; }

    .add-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #e53935;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(229,57,53,0.3);
      transition: background 0.15s;
    }

    .add-btn:hover { background: #c62828; }

    .alarm-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .alarm-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f5f5f7;
      border-radius: 12px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .alarm-item.fired {
      background: #fff0f0;
      border-left: 3px solid #e53935;
      animation: pulse 0.6s infinite alternate;
    }

    .alarm-item .del {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .alarm-item .del:hover { color: #e53935; }

    .status {
      text-align: center;
      font-size: 0.82rem;
      color: #e53935;
      margin-top: 12px;
      font-weight: 600;
      min-height: 18px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('timer')">TIMER</div>
    <div class="tab" onclick="switchTab('alarm')">ALARM</div>
  </div>

  <!-- Timer -->
  <div id="panel-timer" class="panel active">
    <div class="circle-wrap">
      <svg class="circle-svg" viewBox="0 0 260 260">
        <!-- tick marks -->
        <g id="ticks"></g>
        <circle class="circle-bg" cx="130" cy="130" r="118"/>
        <circle class="circle-progress" id="progress-ring" cx="130" cy="130" r="118"
          stroke-dasharray="741.4" stroke-dashoffset="0"/>
        <circle class="circle-dot" id="progress-dot" cx="248" cy="130" r="5"/>
      </svg>
      <div class="circle-inner">
        <div class="circle-icon">⏱</div>
        <div class="timer-display idle" id="timer-display">01:00</div>
        <div class="timer-label" id="timer-label">FOCUS SESSION</div>
      </div>
    </div>

    <div class="presets">
      <button class="preset-btn selected" onclick="setPreset(1,this)">1<span>MIN</span></button>
      <button class="preset-btn" onclick="setPreset(2,this)">2<span>MIN</span></button>
      <button class="preset-btn" onclick="setPreset(3,this)">3<span>MIN</span></button>
      <button class="preset-btn" onclick="setPreset(4,this)">4<span>MIN</span></button>
      <button class="preset-btn" onclick="setPreset(5,this)">5<span>MIN</span></button>
    </div>

    <div class="custom-input">
      <div class="time-field">
        <label>HR</label>
        <input type="number" id="inp-h" min="0" max="23" value="0">
      </div>
      <span class="sep">:</span>
      <div class="time-field">
        <label>MIN</label>
        <input type="number" id="inp-m" min="0" max="59" value="1">
      </div>
      <span class="sep">:</span>
      <div class="time-field">
        <label>SEC</label>
        <input type="number" id="inp-s" min="0" max="59" value="0">
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="timerReset()">
        <div class="ctrl-icon">↺</div>
        RESET
      </button>
      <button class="play-btn" id="play-btn" onclick="timerToggle()">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" id="pause-btn" onclick="timerToggle()" style="opacity:0.4;pointer-events:none;">
        <div class="ctrl-icon">⏸</div>
        PAUSE
      </button>
    </div>

    <div class="status" id="timer-status"></div>
  </div>

  <!-- Alarm -->
  <div id="panel-alarm" class="panel">
    <div class="alarm-wrap">
      <div class="alarm-time-row">
        <input type="number" id="al-h" min="0" max="23" placeholder="HH">
        <span class="sep">:</span>
        <input type="number" id="al-m" min="0" max="59" placeholder="MM">
      </div>
      <button class="add-btn" onclick="addAlarm()">アラーム追加</button>
      <div class="alarm-list" id="alarm-list"></div>
      <div class="status" id="alarm-status"></div>
    </div>
  </div>
</div>

<script>
// ---- Ticks ----
(function() {
  const g = document.getElementById('ticks');
  const cx = 130, cy = 130, r = 118;
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
    const isMajor = i % 5 === 0;
    const r1 = r + (isMajor ? 8 : 5);
    const r2 = r + 2;
    const x1 = cx + r1 * Math.cos(angle);
    const y1 = cy + r1 * Math.sin(angle);
    const x2 = cx + r2 * Math.cos(angle);
    const y2 = cy + r2 * Math.sin(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', isMajor ? '#ccc' : '#e8e8e8');
    line.setAttribute('stroke-width', isMajor ? '2' : '1');
    g.appendChild(line);
  }
})();

// ---- Tab ----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['timer','alarm'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

// ---- Timer ----
const CIRCUMFERENCE = 2 * Math.PI * 118; // 741.4
let timerTotal = 1 * 60;
let timerRemaining = 1 * 60;
let timerRunning = false;
let timerInterval = null;

function setPreset(minutes, btn) {
  if (timerRunning) return;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  if (btn) btn.classList.add('selected');
  timerTotal = minutes * 60;
  timerRemaining = timerTotal;
  document.getElementById('inp-h').value = 0;
  document.getElementById('inp-m').value = minutes >= 60 ? Math.floor(minutes/60) : minutes;
  document.getElementById('inp-s').value = 0;
  if (minutes >= 60) {
    document.getElementById('inp-h').value = Math.floor(minutes / 60);
    document.getElementById('inp-m').value = minutes % 60;
  }
  updateDisplay(timerRemaining);
  updateRing(timerRemaining, timerTotal);
}

function getInputSeconds() {
  const h = parseInt(document.getElementById('inp-h').value) || 0;
  const m = parseInt(document.getElementById('inp-m').value) || 0;
  const s = parseInt(document.getElementById('inp-s').value) || 0;
  return h * 3600 + m * 60 + s;
}

function formatMMSS(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateDisplay(sec) {
  const el = document.getElementById('timer-display');
  el.textContent = formatMMSS(sec);
}

function updateRing(remaining, total) {
  const pct = total > 0 ? remaining / total : 1;
  const offset = CIRCUMFERENCE * (1 - pct);
  document.getElementById('progress-ring').style.strokeDashoffset = offset;

  const angle = (1 - pct) * 2 * Math.PI - Math.PI / 2;
  const cx = 130, cy = 130, r = 118;
  const dx = cx + r * Math.cos(angle);
  const dy = cy + r * Math.sin(angle);
  const dot = document.getElementById('progress-dot');
  dot.setAttribute('cx', dx);
  dot.setAttribute('cy', dy);
}

function timerToggle() {
  if (timerRunning) {
    timerPause();
  } else {
    if (timerRemaining === 0 || timerRemaining === timerTotal) {
      const sec = getInputSeconds();
      if (sec <= 0) { document.getElementById('timer-status').textContent = '時間を設定してください'; return; }
      timerTotal = sec;
      timerRemaining = sec;
    }
    timerStart();
  }
}

function timerStart() {
  timerRunning = true;
  document.getElementById('timer-display').className = 'timer-display';
  document.getElementById('timer-status').textContent = '';
  document.getElementById('pause-btn').style.opacity = '1';
  document.getElementById('pause-btn').style.pointerEvents = 'auto';
  // play icon → stop icon
  document.getElementById('play-icon').innerHTML = '<path d="M6 6h4v12H6zm8 0h4v12h-4z"/>';
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateDisplay(timerRemaining);
    updateRing(timerRemaining, timerTotal);
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timer-display').className = 'timer-display done';
      document.getElementById('timer-label').textContent = 'TIME\'S UP!';
      document.getElementById('timer-status').textContent = '完了しました！';
      document.getElementById('play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
      document.getElementById('pause-btn').style.opacity = '0.4';
      document.getElementById('pause-btn').style.pointerEvents = 'none';
      playChime();
    }
  }, 1000);
}

function timerPause() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  document.getElementById('pause-btn').style.opacity = '0.4';
  document.getElementById('pause-btn').style.pointerEvents = 'none';
}

function timerReset() {
  timerPause();
  timerRemaining = timerTotal;
  document.getElementById('timer-display').className = 'timer-display idle';
  document.getElementById('timer-label').textContent = 'FOCUS SESSION';
  document.getElementById('timer-status').textContent = '';
  updateDisplay(timerRemaining);
  updateRing(timerRemaining, timerTotal);
}

// init
updateDisplay(timerRemaining);
updateRing(timerRemaining, timerTotal);

// ---- Alarm ----
const alarms = [];
setInterval(checkAlarms, 1000);

function addAlarm() {
  const h = parseInt(document.getElementById('al-h').value);
  const m = parseInt(document.getElementById('al-m').value);
  if (isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) {
    document.getElementById('alarm-status').textContent = '正しい時刻を入力してください';
    return;
  }
  const label = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  alarms.push({ h, m, label, fired: false, id: Date.now() });
  document.getElementById('alarm-status').textContent = '';
  renderAlarms();
}

function removeAlarm(id) {
  const i = alarms.findIndex(a => a.id === id);
  if (i >= 0) alarms.splice(i, 1);
  renderAlarms();
}

function renderAlarms() {
  const list = document.getElementById('alarm-list');
  list.innerHTML = '';
  alarms.forEach(a => {
    const el = document.createElement('div');
    el.className = 'alarm-item' + (a.fired ? ' fired' : '');
    el.innerHTML = `<span>${a.label}</span><button class="del" onclick="removeAlarm(${a.id})">✕</button>`;
    list.appendChild(el);
  });
}

function checkAlarms() {
  const now = new Date();
  alarms.forEach(a => {
    if (!a.fired && now.getHours() === a.h && now.getMinutes() === a.m && now.getSeconds() === 0) {
      a.fired = true;
      document.getElementById('alarm-status').textContent = `⏰ ${a.label} のアラームです！`;
      playChime();
      renderAlarms();
      setTimeout(() => { a.fired = false; renderAlarms(); }, 60000);
    }
  });
}

// ---- Sound: iPhone-like chime (2 回) ----
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playChime() {
  [0, 0.6].forEach(startDelay => {
    // 高い正弦波 + 高次倍音で透明感を出す
    [[1047, 1.0], [2093, 0.4], [3136, 0.15]].forEach(([freq, gain]) => {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + startDelay;
      gainNode.gain.setValueAtTime(0, t);
      gainNode.gain.linearRampToValueAtTime(0.18 * gain, t + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t);
      osc.stop(t + 0.45);
    });
  });
}
</script>
</body>
</html>
